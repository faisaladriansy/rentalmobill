<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Activity Diagram - Transaksi Baru</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .wrap { max-width: 600px; margin: auto; background: white; padding: 20px; border: 1px solid #ccc; }
        h2 { text-align: center; font-size: 16px; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="wrap">
    <h2>Activity Diagram – Membuat Transaksi Baru</h2>

    <svg width="560" height="820" xmlns="http://www.w3.org/2000/svg" font-family="Arial" font-size="12">

        <!-- ── Swimlane border & divider ── -->
        <rect x="10" y="10" width="540" height="800" fill="none" stroke="#333" stroke-width="2"/>
        <line x1="290" y1="10" x2="290" y2="810" stroke="#333" stroke-width="2"/>

        <!-- ── Headers ── -->
        <rect x="10" y="10" width="280" height="35" fill="#f0f0f0" stroke="#333" stroke-width="1"/>
        <rect x="290" y="10" width="260" height="35" fill="#f0f0f0" stroke="#333" stroke-width="1"/>
        <text x="150" y="33" text-anchor="middle" font-weight="bold" font-size="14">Admin</text>
        <text x="420" y="33" text-anchor="middle" font-weight="bold" font-size="14">Sistem</text>

        <!-- ── Helper: arrow marker ── -->
        <defs>
            <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
            </marker>
        </defs>

        <!-- ① Start -->
        <circle cx="150" cy="75" r="10" fill="#000"/>

        <!-- arrow down -->
        <line x1="150" y1="85" x2="150" y2="108" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

        <!-- ② Admin Login -->
        <rect x="60" y="110" width="180" height="36" rx="18" fill="white" stroke="#333" stroke-width="1.5"/>
        <text x="150" y="133" text-anchor="middle">Admin Login Sistem</text>

        <!-- arrow right to Sistem -->
        <line x1="240" y1="128" x2="308" y2="128" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

        <!-- ② Sistem: Halaman Utama -->
        <rect x="310" y="110" width="200" height="36" rx="18" fill="white" stroke="#333" stroke-width="1.5"/>
        <text x="410" y="128" text-anchor="middle">Sistem Menampilkan</text>
        <text x="410" y="142" text-anchor="middle">Halaman Utama</text>

        <!-- arrow down Admin -->
        <line x1="150" y1="146" x2="150" y2="178" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
        <!-- arrow down Sistem -->
        <line x1="410" y1="148" x2="410" y2="178" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

        <!-- ③ Admin: Pilih Menu Transaksi -->
        <rect x="50" y="180" width="200" height="36" rx="18" fill="white" stroke="#333" stroke-width="1.5"/>
        <text x="150" y="198" text-anchor="middle">Admin Memilih</text>
        <text x="150" y="212" text-anchor="middle">Menu Transaksi</text>

        <!-- arrow right -->
        <line x1="250" y1="198" x2="308" y2="198" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

        <!-- ③ Sistem: Tampil Daftar -->
        <rect x="310" y="180" width="200" height="36" rx="18" fill="white" stroke="#333" stroke-width="1.5"/>
        <text x="410" y="198" text-anchor="middle">Menampilkan Daftar</text>
        <text x="410" y="212" text-anchor="middle">Transaksi</text>

        <!-- arrow down Admin -->
        <line x1="150" y1="216" x2="150" y2="248" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
        <!-- arrow down Sistem -->
        <line x1="410" y1="216" x2="410" y2="248" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

        <!-- ④ Admin: Klik Tambah -->
        <rect x="50" y="250" width="200" height="36" rx="18" fill="white" stroke="#333" stroke-width="1.5"/>
        <text x="150" y="268" text-anchor="middle">Admin Klik</text>
        <text x="150" y="282" text-anchor="middle">Tambah Transaksi</text>

        <!-- arrow right -->
        <line x1="250" y1="268" x2="308" y2="268" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

        <!-- ④ Sistem: Tampil Form -->
        <rect x="310" y="250" width="200" height="36" rx="18" fill="white" stroke="#333" stroke-width="1.5"/>
        <text x="410" y="268" text-anchor="middle">Menampilkan Form</text>
        <text x="410" y="282" text-anchor="middle">Transaksi Baru</text>

        <!-- arrow down Admin -->
        <line x1="150" y1="286" x2="150" y2="318" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
        <!-- arrow down Sistem -->
        <line x1="410" y1="286" x2="410" y2="318" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

        <!-- ⑤ Admin: Isi Form -->
        <rect x="50" y="320" width="200" height="36" rx="18" fill="white" stroke="#333" stroke-width="1.5"/>
        <text x="150" y="338" text-anchor="middle">Admin Mengisi</text>
        <text x="150" y="352" text-anchor="middle">Data Transaksi</text>

        <!-- arrow right -->
        <line x1="250" y1="338" x2="308" y2="338" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

        <!-- ⑤ Sistem: Validasi -->
        <rect x="310" y="320" width="200" height="36" rx="18" fill="white" stroke="#333" stroke-width="1.5"/>
        <text x="410" y="338" text-anchor="middle">Sistem Memvalidasi</text>
        <text x="410" y="352" text-anchor="middle">Data</text>

        <!-- arrow down Sistem -->
        <line x1="410" y1="356" x2="410" y2="388" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

        <!-- ⑥ Decision diamond -->
        <polygon points="410,390 445,415 410,440 375,415" fill="white" stroke="#333" stroke-width="1.5"/>
        <text x="410" y="419" text-anchor="middle" font-size="11">Valid?</text>

        <!-- branch Tidak Valid (kiri) -->
        <line x1="375" y1="415" x2="310" y2="415" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
        <text x="340" y="408" text-anchor="middle" font-size="10" font-style="italic">Tidak</text>

        <!-- Pesan Error -->
        <rect x="310" y="430" width="200" height="36" rx="18" fill="white" stroke="#333" stroke-width="1.5"/>
        <text x="410" y="448" text-anchor="middle">Menampilkan</text>
        <text x="410" y="462" text-anchor="middle">Pesan Error</text>

        <!-- arrow kembali ke Admin (ulangi) -->
        <line x1="310" y1="448" x2="252" y2="448" stroke="#333" stroke-width="1.5"/>
        <line x1="252" y1="448" x2="252" y2="338" stroke="#333" stroke-width="1.5"/>
        <line x1="252" y1="338" x2="252" y2="338" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
        <text x="270" y="400" text-anchor="middle" font-size="10" font-style="italic">Ulangi</text>

        <!-- branch Valid (bawah) -->
        <line x1="410" y1="440" x2="410" y2="488" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
        <text x="425" y="468" font-size="10" font-style="italic">Ya</text>

        <!-- ⑦ Simpan Transaksi -->
        <rect x="310" y="490" width="200" height="36" rx="18" fill="white" stroke="#333" stroke-width="1.5"/>
        <text x="410" y="508" text-anchor="middle">Menyimpan</text>
        <text x="410" y="522" text-anchor="middle">Data Transaksi</text>

        <!-- arrow down -->
        <line x1="410" y1="526" x2="410" y2="558" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

        <!-- ⑧ Update Status Mobil -->
        <rect x="310" y="560" width="200" height="36" rx="18" fill="white" stroke="#333" stroke-width="1.5"/>
        <text x="410" y="578" text-anchor="middle">Update Status Mobil</text>
        <text x="410" y="592" text-anchor="middle">Menjadi Jalan</text>

        <!-- arrow down -->
        <line x1="410" y1="596" x2="410" y2="628" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

        <!-- ⑨ Notifikasi -->
        <rect x="310" y="630" width="200" height="36" rx="18" fill="white" stroke="#333" stroke-width="1.5"/>
        <text x="410" y="648" text-anchor="middle">Menampilkan Notifikasi</text>
        <text x="410" y="662" text-anchor="middle">Transaksi Berhasil</text>

        <!-- arrow down -->
        <line x1="410" y1="666" x2="410" y2="698" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

        <!-- ⑩ End -->
        <circle cx="410" cy="712" r="10" fill="none" stroke="#333" stroke-width="2"/>
        <circle cx="410" cy="712" r="6" fill="#000"/>

    </svg>
</div>

<!-- PlantUML Code -->
<div class="wrap" style="margin-top: 20px;">
    <h2>📝 PlantUML Code</h2>
    <button onclick="copyCode()" style="
        margin-bottom: 10px;
        padding: 8px 20px;
        background: #2a5298;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
    ">📋 Copy Code</button>
    <span id="copied" style="color:green; font-size:13px; display:none; margin-left:8px;">✅ Copied!</span>

    <textarea id="pumlCode" readonly style="
        width: 100%;
        height: 320px;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        line-height: 1.6;
        padding: 14px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #f8f9fa;
        resize: vertical;
        box-sizing: border-box;
    ">@startuml ActivityDiagram_TransaksiBaru

|Admin|
start
:Admin Login Sistem;

|Sistem|
:Sistem Menampilkan Halaman Utama;

|Admin|
:Admin Memilih Menu Transaksi;

|Sistem|
:Menampilkan Daftar Transaksi;

|Admin|
:Admin Klik Tambah Transaksi;

|Sistem|
:Menampilkan Form Transaksi Baru;

|Admin|
:Admin Mengisi Data Transaksi;

|Sistem|
:Sistem Memvalidasi Data;

if (Data Valid?) then
  -> Tidak Valid;
  :Menampilkan Pesan Error;
  |Admin|
  :Ulangi Isi Form;
  |Sistem|
else
  -> Valid;
  :Menyimpan Data Transaksi;
  :Update Status Mobil Menjadi Jalan;
endif

:Menampilkan Notifikasi Transaksi Berhasil;

stop

@enduml</textarea>
</div>

<script>
function copyCode() {
    const ta = document.getElementById('pumlCode');
    ta.select();
    ta.setSelectionRange(0, 99999);
    document.execCommand('copy');
    const msg = document.getElementById('copied');
    msg.style.display = 'inline';
    setTimeout(() => msg.style.display = 'none', 2000);
}
</script>
</body>
</html>
