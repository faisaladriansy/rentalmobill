<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .table-box { fill: #ffffff; stroke: #2c3e50; stroke-width: 2; }
      .table-header { fill: #3498db; }
      .table-text { font-family: Arial, sans-serif; font-size: 12px; fill: #2c3e50; }
      .table-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: white; }
      .pk-field { font-weight: bold; fill: #e74c3c; }
      .fk-field { font-weight: bold; fill: #f39c12; }
      .relation-line { stroke: #34495e; stroke-width: 2; fill: none; }
      .relation-text { font-family: Arial, sans-serif; font-size: 10px; fill: #7f8c8d; }
      .cardinality { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #e74c3c; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="700" fill="#ecf0f1"/>
  
  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="table-title" style="font-size: 20px; fill: #2c3e50;">
    Entity Relationship Diagram - Sistem Rental Mobil
  </text>
  
  <!-- MERK Table -->
  <g id="merk-table">
    <rect x="50" y="80" width="180" height="120" class="table-box"/>
    <rect x="50" y="80" width="180" height="30" class="table-header"/>
    <text x="140" y="100" text-anchor="middle" class="table-title">MERK</text>
    
    <text x="60" y="125" class="table-text pk-field">🔑 idmerk (PK)</text>
    <text x="60" y="145" class="table-text">namamerk</text>
    <text x="60" y="165" class="table-text">namamerk_seo</text>
  </g>
  
  <!-- MOBIL Table -->
  <g id="mobil-table">
    <rect x="350" y="80" width="200" height="280" class="table-box"/>
    <rect x="350" y="80" width="200" height="30" class="table-header"/>
    <text x="450" y="100" text-anchor="middle" class="table-title">MOBIL</text>
    
    <text x="360" y="125" class="table-text pk-field">🔑 idmobil (PK)</text>
    <text x="360" y="145" class="table-text">date</text>
    <text x="360" y="165" class="table-text fk-field">🔗 idmerk (FK)</text>
    <text x="360" y="185" class="table-text">type</text>
    <text x="360" y="205" class="table-text">tahunproduksi</text>
    <text x="360" y="225" class="table-text">platnomer</text>
    <text x="360" y="245" class="table-text">kursi</text>
    <text x="360" y="265" class="table-text">tarif</text>
    <text x="360" y="285" class="table-text">lembur</text>
    <text x="360" y="305" class="table-text">norangka</text>
    <text x="360" y="325" class="table-text">foto</text>
    <text x="360" y="345" class="table-text">stmobil</text>
  </g>
  
  <!-- TRANSAKSI Table -->
  <g id="transaksi-table">
    <rect x="700" y="80" width="220" height="320" class="table-box"/>
    <rect x="700" y="80" width="220" height="30" class="table-header"/>
    <text x="810" y="100" text-anchor="middle" class="table-title">TRANSAKSI</text>
    
    <text x="710" y="125" class="table-text pk-field">🔑 idtransaksi (PK)</text>
    <text x="710" y="145" class="table-text">date</text>
    <text x="710" y="165" class="table-text">namapelanggan</text>
    <text x="710" y="185" class="table-text">noktp</text>
    <text x="710" y="205" class="table-text">nohp</text>
    <text x="710" y="225" class="table-text">alamat</text>
    <text x="710" y="245" class="table-text">tglsewa</text>
    <text x="710" y="265" class="table-text">tglkembali</text>
    <text x="710" y="285" class="table-text">selisih</text>
    <text x="710" y="305" class="table-text fk-field">🔗 idmobil (FK)</text>
    <text x="710" y="325" class="table-text fk-field">🔗 idsupir (FK)</text>
    <text x="710" y="345" class="table-text">total</text>
    <text x="710" y="365" class="table-text">sttransaksi</text>
  </g>
  
  <!-- SUPIR Table -->
  <g id="supir-table">
    <rect x="400" y="450" width="200" height="200" class="table-box"/>
    <rect x="400" y="450" width="200" height="30" class="table-header"/>
    <text x="500" y="470" text-anchor="middle" class="table-title">SUPIR</text>
    
    <text x="410" y="495" class="table-text pk-field">🔑 idsupir (PK)</text>
    <text x="410" y="515" class="table-text">date</text>
    <text x="410" y="535" class="table-text">namasupir</text>
    <text x="410" y="555" class="table-text">tgllahir</text>
    <text x="410" y="575" class="table-text">alamat</text>
    <text x="410" y="595" class="table-text">noktp</text>
    <text x="410" y="615" class="table-text">foto</text>
    <text x="410" y="635" class="table-text">tarif</text>
  </g>
  
  <!-- USER Table (Independent) -->
  <g id="user-table">
    <rect x="50" y="450" width="180" height="140" class="table-box"/>
    <rect x="50" y="450" width="180" height="30" class="table-header"/>
    <text x="140" y="470" text-anchor="middle" class="table-title">USER</text>
    
    <text x="60" y="495" class="table-text pk-field">🔑 iduser (PK)</text>
    <text x="60" y="515" class="table-text">username</text>
    <text x="60" y="535" class="table-text">password</text>
    <text x="60" y="555" class="table-text">lastlogin</text>
    <text x="60" y="575" class="table-text">stuser</text>
  </g>
  
  <!-- Relations -->
  
  <!-- MERK to MOBIL (1:M) -->
  <line x1="230" y1="140" x2="350" y2="165" class="relation-line"/>
  <circle cx="230" cy="140" r="3" fill="#e74c3c"/>
  <text x="240" y="135" class="cardinality">1</text>
  <text x="340" y="160" class="cardinality">M</text>
  <text x="280" y="145" class="relation-text">idmerk</text>
  
  <!-- MOBIL to TRANSAKSI (1:M) -->
  <line x1="550" y1="200" x2="700" y2="305" class="relation-line"/>
  <circle cx="550" cy="200" r="3" fill="#e74c3c"/>
  <text x="560" y="195" class="cardinality">1</text>
  <text x="690" y="300" class="cardinality">M</text>
  <text x="615" y="245" class="relation-text">idmobil</text>
  
  <!-- SUPIR to TRANSAKSI (1:M, Optional) -->
  <line x1="500" y1="450" x2="810" y2="400" class="relation-line" stroke-dasharray="5,5"/>
  <circle cx="500" cy="450" r="3" fill="#f39c12"/>
  <text x="510" y="445" class="cardinality">1</text>
  <text x="820" y="395" class="cardinality">M</text>
  <text x="640" y="420" class="relation-text">idsupir (Optional)</text>
  
  <!-- Legend -->
  <g id="legend">
    <rect x="50" y="620" width="300" height="70" fill="white" stroke="#bdc3c7" stroke-width="1"/>
    <text x="60" y="635" class="table-text" style="font-weight: bold;">Legend:</text>
    <text x="60" y="650" class="table-text pk-field">🔑 Primary Key (PK)</text>
    <text x="60" y="665" class="table-text fk-field">🔗 Foreign Key (FK)</text>
    <line x1="60" y1="675" x2="90" y2="675" class="relation-line"/>
    <text x="95" y="680" class="relation-text">Mandatory Relation</text>
    <line x1="180" y1="675" x2="210" y2="675" class="relation-line" stroke-dasharray="3,3"/>
    <text x="215" y="680" class="relation-text">Optional Relation</text>
  </g>
  
  <!-- Cardinality Legend -->
  <g id="cardinality-legend">
    <rect x="370" y="620" width="200" height="70" fill="white" stroke="#bdc3c7" stroke-width="1"/>
    <text x="380" y="635" class="table-text" style="font-weight: bold;">Cardinality:</text>
    <text x="380" y="650" class="table-text">1 = One (Satu)</text>
    <text x="380" y="665" class="table-text">M = Many (Banyak)</text>
    <text x="380" y="680" class="table-text">Optional = Bisa NULL</text>
  </g>
  
  <!-- Business Rules -->
  <g id="business-rules">
    <rect x="590" y="620" width="350" height="70" fill="white" stroke="#bdc3c7" stroke-width="1"/>
    <text x="600" y="635" class="table-text" style="font-weight: bold;">Business Rules:</text>
    <text x="600" y="650" class="table-text">• Merk tidak bisa dihapus jika ada mobil</text>
    <text x="600" y="665" class="table-text">• Mobil tidak bisa dihapus jika ada transaksi aktif</text>
    <text x="600" y="680" class="table-text">• Supir bisa dihapus, transaksi jadi "Lepas Kunci"</text>
  </g>
</svg>